- title: 斗罗大陆III龙王传说
  url: /novel/1
  img: /img/1.jpg
  author: 唐家三少
  description: 伴随着魂导科技的进步，斗罗大陆上的人类征服了海洋，又发现了两片大陆。魂兽也随着人类魂师的猎杀无度走向灭亡，沉睡无数年的魂兽之王在星斗大森林最后的净土苏醒，它要带领仅存的族人，向人类复仇！唐舞麟立志要成为一名强大的魂师，可当武魂觉醒时，苏醒的，却是……旷世之才，龙王之争，我们的龙王传说，将由此开始。
- title: 凡人修仙传
  url: /novel/2
  img: /img/2.jpg
  author: 忘语
  description:     修仙觅长生，热血任逍遥，踏莲曳波涤剑骨，凭虚御风塑圣魂！

- title: 凡人修仙之仙界篇
  url: /novel/3
  img: /img/3.jpg
  author: 忘语
  description: 凡人修仙，风云再起时空穿梭，轮回逆转金仙太乙，大罗道祖三千大道，法则至尊《凡人修仙传》仙界篇，一个韩立叱咤仙界的故事，一个凡人小子修仙的不灭传说。特说明下，没有看过前传的书友，并不影响本书的阅读体验，但感兴趣的书友，也可以先去看看《凡人修仙传》，再来看本书哦。
- title: 遮天
  url: /novel/4
  img: /img/4.jpg
  author: 辰东
  description: 冰冷与黑暗并存的宇宙深处，九具庞大的龙尸拉着一口青铜古棺，亘古长存。这是太空探测器在枯寂的宇宙中捕捉到的一幅极其震撼的画面。九龙拉棺，究竟是回到了上古，还是来到了星空的彼岸？一个浩大的仙侠世界，光怪陆离，神秘无尽。热血似火山沸腾，激情若瀚海汹涌，欲望如深渊无止境……登天路，踏歌行，弹指遮天。
